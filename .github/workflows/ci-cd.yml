name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
    tags: ["v*.*.*"]
  
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Install dependencies
        working-directory: ./imedia
        run: poetry install --no-root

      - name: Run tests
        working-directory: ./imedia
        run: poetry run pytest tests/ -v --tb=short
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: test_db
          DB_USER: test
          DB_PASSWORD: test
          API_PORT: 8000
      
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build image (sans push)
        uses: docker/build-push-action@v5
        with:
          context: ./imedia
          file: ./imedia/DockerFile
          push: false
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/imedia:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max


  push:
    name: Push to Registry
    runs-on: ubuntu-latest
    needs: build

    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
  
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/imedia
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./imedia
          file: ./imedia/DockerFile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Simulate staging deployement
        run: |
          echo "Deploying sha-${{ github.sha }} to staging ..."
          echo "Image: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/imedia:sha-${{ github.sha }}"
          echo "URL: https://staging.imedia.com/api/v1"

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: push
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Simulate production deployement
        run: |
          echo "Deploying tag-${{ github.ref_name }} to production ..."
          echo "Image: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/imedia:${{ github.ref_name }}"
          echo "URL: https://imedia.com/api/v1"

